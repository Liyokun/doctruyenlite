<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA LIBRARY LITE</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: #000; 
            background-size: cover; background-position: center; background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; color: #fff; overflow: hidden; 
        }
        
        #main-view { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; z-index: 1; }
        
        /* HEADER LITE ĐÃ ĐƯỢC THU GỌN */
        .header { 
            position: relative; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
        }

        .header-title { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        .back-to-index {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            cursor: pointer;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .back-to-index:active { opacity: 0.5; transform: translateY(-50%) scale(0.9); }

        .list-container { flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 100px; }
        
        .cat-card { 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3); 
            padding: 25px; margin-bottom: 20px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; 
        }
        .cat-card:active { background: rgba(0,0,0,0.7); transform: scale(0.98); }
        .cat-info { flex: 1; } .delete-icon { font-size: 20px; color: #ff4444; padding: 10px; margin-right: -10px; transition: 0.2s; }
        
        #virtual-tab { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: transparent; background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 999; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        #virtual-tab.active { transform: translateX(0); }
        
        .tab-header { height: 60px; display: flex; align-items: center; padding: 0 20px; border-bottom: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .back-btn { font-size: 28px; padding: 10px; cursor: pointer; margin-right: 15px; }
        
        .story-task { 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); 
            margin-bottom: 20px; border-radius: 12px; overflow: hidden; transition: 0.3s; 
        }
        .story-header { padding: 25px; font-weight: bold; font-size: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; gap: 10px; }
        .story-cover-thumb { width: 50px; height: 70px; object-fit: cover; border-radius: 4px; background: #222; margin-right: 15px; flex-shrink: 0; }
        .story-details { max-height: 0; overflow: hidden; background: rgba(0,0,0,0.4); transition: max-height 0.4s ease; padding: 0 25px; border-top: 1px solid rgba(255,255,255,0.05); }
        .story-task.expanded .story-details { max-height: 800px; padding-bottom: 25px; }
        
        .toggle-icon { display: inline-block; transition: transform 0.3s ease; }
        .story-task.expanded .toggle-icon { transform: rotate(180deg); }

        /* ÉP DÒNG TÁC GIẢ CHẠY NGANG (CHỐNG LỖI CHÁO HEO) */
        .author-text {
            font-size: 14px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            margin-bottom: 10px;
            display: block;
        }

        .scroll-container { display: flex; gap: 8px; margin-top: 8px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; scrollbar-width: none; -ms-overflow-style: none; }
        .scroll-container::-webkit-scrollbar { display: none; }
        .tag-pill { background: #333; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #eee; flex-shrink: 0; }
        
        .btn-read { background: #fff; color: #000; padding: 12px 30px; border-radius: 30px; font-weight: bold; font-size: 14px; text-decoration: none; display: inline-block; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .btn-delete { color: #ff4444; font-size: 14px; cursor: pointer; text-decoration: underline; padding: 10px; }
        
        .fab-btn { position: fixed; bottom: 40px; right: 30px; width: 70px; height: 70px; border-radius: 50%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); border: 2px solid #fff; color: #fff; font-size: 36px; display: flex; justify-content: center; align-items: center; z-index: 50; }
        
        /* Popup */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-box { width: 85%; max-width: 350px; background: #111; border: 1px solid #fff; border-radius: 15px; padding: 30px; text-align: center; }

        .spinner { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="main-view">
        <div class="header">
            <div class="back-to-index" onclick="window.location.href='index.html'">&#8592;</div>
            <div class="header-title">THƯ VIỆN LITE</div>
        </div>
        <div id="category-list" class="list-container"></div>
        <div class="fab-btn" onclick="openModal('modal-add-cat')">+</div>
    </div>

    <div id="virtual-tab">
        <div class="tab-header">
            <div class="back-btn" onclick="closeVirtualTab()">&#8592;</div>
            <div class="header-title" id="tab-title">...</div>
        </div>
        <div id="story-list" class="list-container"></div>
        <div class="fab-btn" onclick="openModal('modal-add-story')">+</div>
    </div>

    <div id="modal-add-cat" class="modal-overlay">
        <div class="modal-box">
            <div style="margin-bottom:20px; font-weight:bold">CHỦ ĐỀ</div>
            <input type="text" id="input-cat-name" style="width:100%; padding:15px; background:#000; border:1px solid #555; color:#fff; text-align:center; border-radius:8px; margin-bottom:20px" placeholder="Nhập tên...">
            <div style="display:flex; gap:10px"><button onclick="closeModal('modal-add-cat')" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:8px">HỦY</button><button onclick="handleAddCategory()" style="flex:1; padding:12px; background:#fff; color:#000; font-weight:bold; border:none; border-radius:8px">TẠO</button></div>
        </div>
    </div>

    <div id="modal-cat-options" class="modal-overlay">
        <div class="modal-box">
            <div style="margin-bottom:20px; font-weight:bold; font-size:18px;">TÙY CHỌN CHỦ ĐỀ</div>
            <div style="display:flex; flex-direction:column; gap:10px">
                <button onclick="openRenameModal()" style="padding:15px; background:#fff; color:#000; font-weight:bold; border:none; border-radius:8px; cursor:pointer;">ĐỔI TÊN CHỦ ĐỀ</button>
                <button onclick="openDeleteConfirm()" style="padding:15px; background:#ff4444; color:#fff; font-weight:bold; border:none; border-radius:8px; cursor:pointer;">XÓA CHỦ ĐỀ</button>
                <button onclick="closeModal('modal-cat-options')" style="padding:15px; background:#333; color:#fff; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin-top:10px;">HỦY BỎ</button>
            </div>
        </div>
    </div>

    <div id="modal-rename-cat" class="modal-overlay">
        <div class="modal-box">
            <div style="margin-bottom:20px; font-weight:bold">ĐỔI TÊN CHỦ ĐỀ</div>
            <input type="text" id="input-rename-cat" style="width:100%; padding:15px; background:#000; border:1px solid #555; color:#fff; text-align:center; border-radius:8px; margin-bottom:20px" placeholder="Nhập tên mới...">
            <div style="display:flex; gap:10px">
                <button onclick="closeModal('modal-rename-cat')" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:8px">HỦY</button>
                <button onclick="handleRenameCategory()" style="flex:1; padding:12px; background:#fff; color:#000; font-weight:bold; border:none; border-radius:8px">LƯU</button>
            </div>
        </div>
    </div>

    <div id="modal-delete-cat" class="modal-overlay">
        <div class="modal-box">
            <div style="margin-bottom:15px; font-weight:bold; color:#ff4444; font-size:20px;">XÁC NHẬN XÓA</div>
            <div style="margin-bottom:25px; color:#ccc; font-size:14px; line-height:1.5;">Bạn có chắc chắn muốn xóa chủ đề này cùng tất cả link truyện bên trong không?</div>
            <div style="display:flex; gap:10px">
                <button onclick="closeModal('modal-delete-cat')" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:8px; font-weight:bold;">HỦY</button>
                <button onclick="handleDeleteCategory()" style="flex:1; padding:12px; background:#ff4444; color:#fff; font-weight:bold; border:none; border-radius:8px;">XÓA</button>
            </div>
        </div>
    </div>

    <div id="modal-add-story" class="modal-overlay">
        <div class="modal-box">
            <div style="margin-bottom:20px; font-weight:bold">THÊM TRUYỆN MỚI</div>
            <input type="text" id="input-story-url" style="width:100%; padding:15px; background:#000; border:1px solid #555; color:#fff; text-align:center; border-radius:8px; margin-bottom:20px" placeholder="Dán link truyện vào đây...">
            <div style="display:flex; gap:10px">
                <button onclick="closeModal('modal-add-story')" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:8px">HỦY</button>
                <button onclick="handleFetchAndSaveStory()" style="flex:1; padding:12px; background:#fff; color:#000; font-weight:bold; border:none; border-radius:8px">LƯU & QUÉT</button>
            </div>
        </div>
    </div>

    <div id="modal-loading" class="modal-overlay">
        <div class="modal-box"><div class="spinner"></div><div id="loading-text" style="font-weight:bold; letter-spacing: 1px;">ĐANG KẾT NỐI...</div></div>
    </div>

    <div id="modal-confirm-story-delete" class="modal-overlay">
        <div class="modal-box">
            <div style="margin-bottom:15px; font-weight:bold; color:#ff4444; font-size:20px;">XÓA TRUYỆN?</div>
            <div style="margin-bottom:25px; color:#ccc; font-size:14px; line-height:1.5;">Hành động này sẽ gỡ bỏ link truyện khỏi thư viện. Bạn chắc chắn chứ?</div>
            <div style="display:flex; gap:10px">
                <button onclick="closeModal('modal-confirm-story-delete')" style="flex:1; padding:12px; background:#333; color:#fff; border:none; border-radius:8px; font-weight:bold;">HỦY</button>
                <button onclick="executeDeleteStory()" style="flex:1; padding:12px; background:#ff4444; color:#fff; font-weight:bold; border:none; border-radius:8px;">XÓA</button>
            </div>
        </div>
    </div>

    <script>
        const PROXY_HOST = "https://doctruyen01.nguyenphuoctu6554.workers.dev/?url=";
        let libraryData = [];
        let currentCatID = null;
        let actionCatID = null; 
        let storyIDToDelete = null;

        window.onload = async function() {
            libraryData = await localforage.getItem('aura_library_v2') || [];
            
            let currentBgIndex = await localforage.getItem('aura_bg_index') || localStorage.getItem('aura_bg_index') || 1;
            document.body.style.backgroundImage = `url('./book0${currentBgIndex}.jpg')`;
            
            renderCategories();
        };

        function renderCategories() {
            const container = document.getElementById('category-list'); container.innerHTML = '';
            if (libraryData.length === 0) { container.innerHTML = '<div style="text-align:center; color:#ddd; margin-top:80px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Nhấn + để bắt đầu thêm chủ đề.</div>'; return; }
            libraryData.forEach(cat => {
                const card = document.createElement('div'); card.className = 'cat-card';
                card.innerHTML = `<div class="cat-info" onclick="openVirtualTab('${cat.id}')"><span>${cat.name} <span style="opacity:0.5; font-size:14px">(${cat.stories.length})</span></span></div><span class="delete-icon" onclick="openCatOptions('${cat.id}')">📝</span>`;
                container.appendChild(card);
            });
        }

        function openCatOptions(id) { actionCatID = id; openModal('modal-cat-options'); }
        function openRenameModal() { closeModal('modal-cat-options'); const cat = libraryData.find(c => c.id === actionCatID); document.getElementById('input-rename-cat').value = cat ? cat.name : ''; openModal('modal-rename-cat'); }

        async function handleRenameCategory() {
            const newName = document.getElementById('input-rename-cat').value.trim();
            if (newName && actionCatID) {
                const cat = libraryData.find(c => c.id === actionCatID);
                if(cat) cat.name = newName;
                await saveData();
                renderCategories();
            }
            closeModal('modal-rename-cat');
        }

        function openDeleteConfirm() { closeModal('modal-cat-options'); openModal('modal-delete-cat'); }

        async function handleDeleteCategory() {
            if (actionCatID) {
                libraryData = libraryData.filter(c => c.id !== actionCatID);
                await saveData(); 
                renderCategories();
                alert("Đã xóa chủ đề thành công!");
            }
            closeModal('modal-delete-cat');
        }

        async function handleAddCategory() {
            const name = document.getElementById('input-cat-name').value.trim();
            if (name) { libraryData.push({ id: 'CAT_' + Date.now(), name, stories: [] }); await saveData(); renderCategories(); }
            closeModal('modal-add-cat'); document.getElementById('input-cat-name').value = '';
        }

        function openVirtualTab(id) {
            currentCatID = id; const cat = libraryData.find(c => c.id === id);
            document.getElementById('tab-title').innerText = cat.name;
            renderStories(cat); document.getElementById('virtual-tab').classList.add('active');
        }

        function closeVirtualTab() { document.getElementById('virtual-tab').classList.remove('active'); renderCategories(); }

        function renderStories(cat) {
            const container = document.getElementById('story-list'); container.innerHTML = '';
            if (cat.stories.length === 0) { container.innerHTML = '<div style="text-align:center; color:#ddd; margin-top:80px;">Chưa có link truyện nào.</div>'; return; }
            cat.stories.forEach(s => {
                const task = document.createElement('div'); task.className = 'story-task';
                
                // ĐÃ SỬA: Thêm class author-text để ép dòng chống lỗi hiển thị dài
                task.innerHTML = `
                <div class="story-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <img src="${s.cover}" class="story-cover-thumb" onerror="this.src='./book01.jpg'">
                    <span>${s.title}</span>
                    <span class="toggle-icon">▼</span>
                </div>
                <div class="story-details">
                    <div class="author-text">Tác giả: ${s.author}</div>
                    <div class="scroll-container">${s.tags.map(t=>`<span class="tag-pill">${t}</span>`).join('')}</div>
                    <div style="margin-top:20px; display:flex; justify-content:space-between; align-items:center">
                        <span onclick="deleteStory('${s.id}')" style="color:#ff4444; font-size:13px; cursor:pointer; font-weight:bold;">Xóa truyện</span>
                        <a href="${s.url}" target="_blank" class="btn-read">ĐỌC TRUYỆN 📖</a>
                    </div>
                </div>`;
                container.appendChild(task);
            });
        }

        async function handleFetchAndSaveStory() {
            const url = document.getElementById('input-story-url').value.trim();
            if (!url) { alert("Vui lòng dán link truyện vào!"); return; }

            closeModal('modal-add-story');
            openModal('modal-loading');
            
            let baseUrl = "";
            try { baseUrl = new URL(url).origin; } catch(e) { baseUrl = ""; }

            try {
                updateLoadingText("ĐANG QUÉT THÔNG TIN...");
                const res = await fetch(PROXY_HOST + encodeURIComponent(url));
                let htmlText = await res.text();

                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");

                const title = doc.querySelector("h1, h2, .title, .cover-info h2")?.textContent.trim() || doc.title || "Truyện chưa rõ tên";
                
                // Quét tác giả có giới hạn
                let rawAuthor = doc.querySelector("[class*='author'], [href*='tac-gia'], .author, .tac-gia")?.textContent.trim() || "Thiếu dữ liệu";
                let author = rawAuthor.length > 40 ? rawAuthor.substring(0, 40) + "..." : rawAuthor;
                
                let cover = doc.querySelector(".cover img, .book-info img, [src*='cover'], .cover-wrapper img")?.getAttribute("src") || "";
                if (!cover) {
                    const randomNum = Math.floor(Math.random() * 8) + 1;
                    cover = `./book0${randomNum}.jpg`; 
                } else if (cover.startsWith("/")) {
                    cover = baseUrl + cover;
                }

                // Quét Thể loại / Tag
                let tags = Array.from(doc.querySelectorAll(".tags a, [class*='tag'], .book-desc a, [class*='category'], .kind-list a, a[href*='the-loai']"))
                    .map(el => el.textContent.trim())
                    .filter(txt => txt.length > 0 && txt.length < 20); 

                if (tags.length === 0) tags = ["Đang cập nhật"];

                const cat = libraryData.find(c => c.id === currentCatID);
                cat.stories.push({ id: 'STR_LITE_' + Date.now(), title: title, author: author, cover: cover, tags: tags, url: url });
                
                await saveData(); 
                renderStories(cat); 
                closeModal('modal-loading');
                document.getElementById('input-story-url').value = '';

            } catch (err) { 
                const randomNum = Math.floor(Math.random() * 8) + 1;
                const cat = libraryData.find(c => c.id === currentCatID);
                cat.stories.push({ 
                    id: 'STR_LITE_' + Date.now(), 
                    title: "Lỗi quét dữ liệu (Vẫn lưu link)", 
                    author: "Chưa rõ", 
                    cover: `./book0${randomNum}.jpg`, 
                    tags: ["Ngoại tuyến"], 
                    url: url 
                });
                await saveData();
                renderStories(cat);
                closeModal('modal-loading');
                document.getElementById('input-story-url').value = '';
            }
        }

        async function saveData() { 
            await localforage.setItem('aura_library_v2', libraryData); 
        }
        
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function updateLoadingText(t) { document.getElementById('loading-text').innerText = t; }
        
        function deleteStory(id) {
            storyIDToDelete = id;
            openModal('modal-confirm-story-delete');
        }

        async function executeDeleteStory() {
            const id = storyIDToDelete;
            if (!id) return;

            closeModal('modal-confirm-story-delete');

            const cat = libraryData.find(c => c.id === currentCatID);
            if (cat) {
                cat.stories = cat.stories.filter(s => s.id !== id);
                await saveData(); 
                renderStories(cat);
            }
            storyIDToDelete = null;
        }
    </script>
</body>
</html>
